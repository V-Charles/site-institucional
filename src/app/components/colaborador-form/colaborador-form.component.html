<h2 mat-dialog-title>{{ isEdicao ? 'Editar' : 'Novo' }} Colaborador</h2>

<mat-dialog-content [formGroup]="form" class="form-container">
  <mat-form-field appearance="outline">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Cargo</mat-label>
    <input matInput formControlName="cargo">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Departamento</mat-label>
    <input matInput formControlName="departamento">
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
